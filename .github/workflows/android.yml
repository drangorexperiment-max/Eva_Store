name: Build Eva Store APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build release APK
        run: gradle -p android :app:assembleRelease --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/*.apk EvaStore.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-store-apk
          path: EvaStore.apk
          if-no-files-found: error

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Eva Store (latest build)
          files: EvaStore.apk
          make_latest: true
